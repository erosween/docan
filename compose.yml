x-app-environment: &app-environment
  APP_NAME: Docan
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: "${APP_URL:-http://localhost:8080}"
  APP_KEY: "${APP_KEY:-}"
  APP_LOCALE: id
  APP_FALLBACK_LOCALE: id
  LOG_CHANNEL: stderr
  LOG_LEVEL: "${LOG_LEVEL:-warning}"
  DB_CONNECTION: pgsql
  DB_HOST: database
  DB_PORT: 5432
  DB_DATABASE: "${DB_DATABASE:-docan}"
  DB_USERNAME: "${DB_USERNAME:-docan}"
  DB_PASSWORD: "${DB_PASSWORD:-change-this-password}"
  DB_SSLMODE: disable
  SESSION_DRIVER: redis
  SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0
  REDIS_CACHE_DB: 1
  REDIS_QUEUE_CONNECTION: default
  SEED_DATABASE: "${SEED_DATABASE:-true}"
  RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"

x-app-base: &app-base
  build:
    context: .
  image: docan-app:${DOCAN_VERSION:-latest}
  restart: unless-stopped
  environment: *app-environment
  volumes:
    - app_storage:/app/storage
  depends_on:
    database:
      condition: service_healthy
    redis:
      condition: service_healthy
  security_opt:
    - no-new-privileges:true

services:
  gateway:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/Gateway.Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  app:
    <<: *app-base
    deploy:
      replicas: ${APP_REPLICAS:-2}
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT:-768M}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  queue:
    <<: *app-base
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "false"
      SEED_DATABASE: "false"
      OPTIMIZE_APP: "false"
    command: ["php", "artisan", "queue:work", "redis", "--sleep=1", "--tries=3", "--timeout=120", "--max-time=3600"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: ${QUEUE_REPLICAS:-2}
      resources:
        limits:
          memory: 512M

  scheduler:
    <<: *app-base
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "false"
      SEED_DATABASE: "false"
      OPTIMIZE_APP: "false"
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  database:
    image: postgres:17-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=250", "-c", "shared_buffers=256MB", "-c", "effective_cache_size=768MB", "-c", "work_mem=4MB", "-c", "maintenance_work_mem=64MB", "-c", "checkpoint_completion_target=0.9", "-c", "wal_compression=on"]
    environment:
      POSTGRES_DB: "${DB_DATABASE:-docan}"
      POSTGRES_USER: "${DB_USERNAME:-docan}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-change-this-password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-docan} -d ${DB_DATABASE:-docan}"]
      interval: 5s
      timeout: 5s
      retries: 15
    shm_size: 256mb
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
    security_opt:
      - no-new-privileges:true

  loadtest:
    image: grafana/k6:0.57.0
    profiles: ["tools"]
    volumes:
      - ./tests/load:/scripts:ro
    environment:
      BASE_URL: http://gateway
      LOGIN_ID: "${LOADTEST_LOGIN_ID:-SDM-001}"
      PASSWORD: "${LOADTEST_PASSWORD:-password}"
      VUS: "${LOADTEST_VUS:-100}"
      DURATION: "${LOADTEST_DURATION:-3m}"
      RAMP_DURATION: "${LOADTEST_RAMP_DURATION:-30s}"
    command: ["run", "/scripts/k6-read-flow.js"]
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  app_storage:
  postgres_data:
  redis_data:
